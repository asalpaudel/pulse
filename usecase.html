<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; width: 1600px; }
  svg { display: block; }
  text { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
</style>
</head>
<body>
<svg id="c" width="1600" height="1200" viewBox="0 0 1600 1200"></svg>
<script>
const SVG = "http://www.w3.org/2000/svg";
const svg = document.getElementById("c");
function el(tag, attrs, parent) {
  const n = document.createElementNS(SVG, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  (parent || svg).appendChild(n);
  return n;
}
function txt(x, y, s, attrs) {
  const n = el("text", Object.assign({ x, y, "text-anchor": "middle", "font-size": 13, fill: "#1f2937" }, attrs || {}));
  n.textContent = s;
  return n;
}

// arrowhead marker for include/extend
const defs = el("defs", {});
const m = el("marker", { id: "arrow", markerWidth: 12, markerHeight: 12, refX: 9, refY: 4, orient: "auto", markerUnits: "userSpaceOnUse" }, defs);
el("path", { d: "M0,0 L9,4 L0,8", fill: "none", stroke: "#9a3412", "stroke-width": 1.6 }, m);

// ---- title ----
txt(800, 40, "PULSE · Use Case Diagram", { "font-size": 24, "font-weight": 700, fill: "#7a1f1f" });
txt(800, 64, "Centralized Real-Time Digital Blood Coordination and Emergency Response Platform", { "font-size": 13, fill: "#6b7280" });

// ---- system boundary ----
el("rect", { x: 300, y: 90, width: 1000, height: 1080, rx: 16, fill: "#fafafa", stroke: "#9ca3af", "stroke-width": 1.5 });
txt(420, 116, "Pulse System", { "font-size": 14, "font-weight": 700, fill: "#6b7280", "text-anchor": "start" });

// ---- domain band labels ----
const bands = [
  ["ACCOUNT & ACCESS", 150],
  ["BLOOD REQUESTS", 600],
  ["INVENTORY & EVENTS", 300],
  ["ADMINISTRATION", 620],
];
// place band labels subtly (left/right gutters)
txt(800, 126, "ACCOUNT & ACCESS", { "font-size": 11, "font-weight": 700, fill: "#cbb6b6", "letter-spacing": 1.5 });
txt(540, 232, "DONOR & REQUEST FLOWS", { "font-size": 11, "font-weight": 700, fill: "#cbb6b6", "letter-spacing": 1.5 });
txt(1060, 252, "INVENTORY & EVENTS", { "font-size": 11, "font-weight": 700, fill: "#cbb6b6", "letter-spacing": 1.5 });
txt(1060, 572, "ADMINISTRATION", { "font-size": 11, "font-weight": 700, fill: "#cbb6b6", "letter-spacing": 1.5 });

// ---- use case nodes ----
const RX = 112, RY = 34;
const uc = {
  reg:        { x: 560,  y: 168, label: "Register / Login" },
  prof:       { x: 1040, y: 168, label: "Manage Profile" },

  alert:      { x: 540,  y: 285, label: "Receive Emergency Alert" },
  history:    { x: 540,  y: 370, label: "View Donation History" },
  joinevent:  { x: 540,  y: 455, label: "Join Donation Event" },

  respond:    { x: 800,  y: 560, label: "Respond to Blood Request" },
  locsvc:     { x: 800,  y: 820, label: "Access Location Service" },

  createreq:  { x: 540,  y: 555, label: "Create Blood Request" },
  emergency:  { x: 540,  y: 665, label: "Mark as Emergency" },
  searchdonor:{ x: 540,  y: 775, label: "Search Nearby Donors" },
  searchbank: { x: 540,  y: 860, label: "Search Nearby Blood Banks" },
  track:      { x: 540,  y: 945, label: "Track Request Status" },
  viewstock:  { x: 540,  y: 1030, label: "View Blood Stock" },

  managestock:{ x: 1060, y: 300, label: "Manage Blood Stock" },
  createevent:{ x: 1060, y: 390, label: "Create Donation Event" },

  verify:     { x: 1060, y: 635, label: "Verify Users" },
  monitor:    { x: 1060, y: 725, label: "Monitor System" },
  reports:    { x: 1060, y: 815, label: "Generate Reports" },
  roles:      { x: 1060, y: 905, label: "Manage User Roles" },
};

// ---- actors ----
const actors = {
  Donor:     { x: 150,  y: 340 },
  Hospital:  { x: 150,  y: 860 },
  BloodBank: { x: 1450, y: 340, label: "Blood Bank" },
  Admin:     { x: 1450, y: 860, label: "Administrator" },
};

// ---- associations (actor -> use case) ----
const assoc = [
  ["Donor", "reg", 1], ["Donor", "prof", 1],
  ["Donor", "alert"], ["Donor", "history"], ["Donor", "joinevent"], ["Donor", "respond"],
  ["Hospital", "reg", 1], ["Hospital", "prof", 1],
  ["Hospital", "createreq"], ["Hospital", "searchdonor"], ["Hospital", "searchbank"],
  ["Hospital", "track"], ["Hospital", "viewstock"],
  ["BloodBank", "reg", 1], ["BloodBank", "prof", 1],
  ["BloodBank", "managestock"], ["BloodBank", "createevent"], ["BloodBank", "respond"],
  ["Admin", "reg", 1], ["Admin", "prof", 1],
  ["Admin", "verify"], ["Admin", "monitor"], ["Admin", "reports"], ["Admin", "roles"],
];

// ---- include / extend / trigger ----
const rel = [
  ["emergency", "createreq", "«extend»"],
  ["searchdonor", "locsvc", "«include»"],
  ["searchbank", "locsvc", "«include»"],
  ["verify", "reg", "«extend»"],
  ["emergency", "alert", "«trigger»", true],
];

// draw association lines first (under nodes)
function ucAnchor(a, n) {
  // point on ellipse edge toward actor
  const dx = a.x - n.x, dy = a.y - n.y;
  const ang = Math.atan2(dy, dx);
  return { x: n.x + Math.cos(ang) * RX, y: n.y + Math.sin(ang) * RY };
}
assoc.forEach(([ak, uk, light]) => {
  const a = actors[ak], n = uc[uk];
  const p = ucAnchor(a, n);
  el("line", {
    x1: a.x, y1: a.y - 6, x2: p.x, y2: p.y,
    stroke: light ? "#d8d8dc" : "#9aa0aa", "stroke-width": light ? 1 : 1.3,
  });
});

// draw include/extend dashed arrows
rel.forEach(([fromK, toK, label, curve]) => {
  const f = uc[fromK], t = uc[toK];
  if (curve) {
    const sx = f.x - RX + 24, sy = f.y - 8;
    const ex = t.x - RX + 24, ey = t.y + 8;
    const cx = Math.min(sx, ex) - 150, cy = (sy + ey) / 2;
    el("path", { d: `M${sx},${sy} Q${cx},${cy} ${ex},${ey}`, fill: "none", stroke: "#9a3412", "stroke-width": 1.4, "stroke-dasharray": "6 4", "marker-end": "url(#arrow)" });
    el("rect", { fill: "#fafafa", x: cx + 8, y: cy - 9, width: 76, height: 16, rx: 3 });
    txt(cx + 46, cy + 3, label, { "font-size": 10.5, fill: "#9a3412", "font-style": "italic" });
    return;
  }
  const ang = Math.atan2(t.y - f.y, t.x - f.x);
  const x1 = f.x + Math.cos(ang) * RX, y1 = f.y + Math.sin(ang) * RY;
  const x2 = t.x - Math.cos(ang) * (RX + 4), y2 = t.y - Math.sin(ang) * (RY + 4);
  el("line", { x1, y1, x2, y2, stroke: "#9a3412", "stroke-width": 1.4, "stroke-dasharray": "6 4", "marker-end": "url(#arrow)" });
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const bg = el("rect", { fill: "#fafafa", x: mx - 38, y: my - 9, width: 76, height: 16, rx: 3 });
  txt(mx, my + 3, label, { "font-size": 10.5, fill: "#9a3412", "font-style": "italic" });
});

// draw use case ellipses
for (const k in uc) {
  const n = uc[k];
  el("ellipse", { cx: n.x, cy: n.y, rx: RX, ry: RY, fill: "#fff", stroke: "#c4b5fd", "stroke-width": 1.6 });
  // wrap label if long
  const words = n.label.split(" ");
  if (n.label.length > 18 && words.length > 2) {
    const mid = Math.ceil(words.length / 2);
    txt(n.x, n.y - 3, words.slice(0, mid).join(" "), { fill: "#4c1d95", "font-weight": 600 });
    txt(n.x, n.y + 14, words.slice(mid).join(" "), { fill: "#4c1d95", "font-weight": 600 });
  } else {
    txt(n.x, n.y + 5, n.label, { fill: "#4c1d95", "font-weight": 600 });
  }
}

// draw actors (stick figures)
function actor(x, y, label) {
  const g = el("g", {});
  el("circle", { cx: x, cy: y - 42, r: 13, fill: "#7a1f1f", stroke: "#4a0f0f", "stroke-width": 1.5 }, g);
  el("line", { x1: x, y1: y - 29, x2: x, y2: y - 2, stroke: "#7a1f1f", "stroke-width": 2.4 }, g);
  el("line", { x1: x - 20, y1: y - 18, x2: x + 20, y2: y - 18, stroke: "#7a1f1f", "stroke-width": 2.4 }, g);
  el("line", { x1: x, y1: y - 2, x2: x - 16, y2: y + 24, stroke: "#7a1f1f", "stroke-width": 2.4 }, g);
  el("line", { x1: x, y1: y - 2, x2: x + 16, y2: y + 24, stroke: "#7a1f1f", "stroke-width": 2.4 }, g);
  txt(x, y + 44, label, { "font-size": 14, "font-weight": 700, fill: "#7a1f1f" });
}
for (const k in actors) {
  const a = actors[k];
  actor(a.x, a.y, a.label || k);
}

// legend
const ly = 1130;
el("line", { x1: 330, y1: ly, x2: 372, y2: ly, stroke: "#9aa0aa", "stroke-width": 1.3 });
txt(470, ly + 4, "association", { "font-size": 11, fill: "#6b7280", "text-anchor": "start" });
el("line", { x1: 560, y1: ly, x2: 602, y2: ly, stroke: "#9a3412", "stroke-width": 1.4, "stroke-dasharray": "6 4", "marker-end": "url(#arrow)" });
txt(700, ly + 4, "«include» / «extend» / «trigger»", { "font-size": 11, fill: "#6b7280", "text-anchor": "start" });
</script>
</body>
</html>
