spring.application.name=pulse-backend

# --- PostgreSQL datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/pulsedb
spring.datasource.username=pulse
spring.datasource.password=pulse
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Server ---
server.port=8080

# --- JWT (dev secret — replace for prod) ---
pulse.jwt.secret=dev-pulse-secret-change-me-please-min-32-bytes-long
pulse.jwt.expiration-ms=86400000

# --- CORS ---
pulse.cors.allowed-origins=http://localhost:5173

# --- Mail (fill in for real email sending; left blank for dev) ---
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
