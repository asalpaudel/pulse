spring.datasource.url=jdbc:h2:mem:pulse-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
spring.main.banner-mode=off
logging.file.name=

pulse.jwt.secret=test-pulse-secret-key-with-at-least-thirty-two-bytes
pulse.jwt.expiration-ms=60000
pulse.cors.allowed-origins=http://localhost:5173
